tags:
  - Contacts
summary: Створити новий контакт
description: Додає новий контакт. Підтримує multipart/form-data для фото (необов’язково).
operationId: createContact
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
          phoneNumber:
            type: string
          contactType:
            type: string
          photo:
            type: string
            format: binary
        required:
          - name
          - phoneNumber
          - contactType
responses:
  '201':
    description: Контакт успішно створено
    content:
      application/json:
        schema:
          $ref: "../../components/OneContactResponse.yaml"
  '400':
    description: Некоректний запит
    content:
      application/json:
        schema:
          $ref: "../../components/ErrorResponse.yaml"
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: "../../components/ErrorResponse.yaml"
