tags:
  - Contacts
summary: Створити новий контакт
operationId: createContact
description: Додає новий контакт для користувача.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
          phoneNumber:
            type: string
          contactType:
            type: string
          photo:
            type: string
            format: binary
responses:
  '201':
    description: Контакт створено
    content:
      application/json:
        schema:
          $ref: ../../components/OneContactResponse.yaml
  '400':
    description: Некоректні дані
    content:
      application/json:
        schema:
          $ref: ../../components/ErrorResponse.yaml
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: ../../components/ErrorResponse.yaml
