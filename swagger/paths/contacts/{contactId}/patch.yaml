tags:
  - Contacts
summary: Оновити контакт
operationId: updateContact
description: Оновлює існуючий контакт за його ID. Можна змінити ім'я, номер телефону, тип контакту або фото (усі поля необов'язкові).
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: Унікальний ідентифікатор контакту
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
          phoneNumber:
            type: string
          contactType:
            type: string
          photo:
            type: string
            format: binary
responses:
  '200':
    description: Контакт успішно оновлено
    content:
      application/json:
        schema:
          $ref: '../../../components/OneContactResponse.yaml'
  '400':
    description: Некоректний запит
    content:
      application/json:
        schema:
          $ref: '../../../components/ErrorResponse.yaml'
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: '../../../components/ErrorResponse.yaml'
  '404':
    description: Не знайдено (контакт не існує)
    content:
      application/json:
        schema:
          $ref: '../../../components/ErrorResponse.yaml'
