tags:
  - Contacts
summary: Оновити контакт
operationId: updateContact
description: Оновлює дані контакту по contactId.
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: Унікальний ідентифікатор контакту
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: ../../../components/Contact.yaml
responses:
  '200':
    description: Контакт оновлено
    content:
      application/json:
        schema:
          $ref: ../../../components/Contact.yaml
  '404':
    description: Контакт не знайдено
