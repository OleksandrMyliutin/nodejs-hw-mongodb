tags:
  - Contacts
summary: Оновити контакт
operationId: updateContact
description: Оновлює дані контакту по contactId.
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: Унікальний ідентифікатор контакту
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
          phoneNumber:
            type: string
          contactType:
            type: string
          photo:
            type: string
            format: binary
responses:
  '200':
    description: Контакт оновлено
    content:
      application/json:
        schema:
          $ref: ../../../components/OneContactResponse.yaml
  '404':
    description: Контакт не знайдено
    content:
      application/json:
        schema:
          $ref: ../../../components/ErrorResponse.yaml
  '400':
    description: Некоректний запит
    content:
      application/json:
        schema:
          $ref: ../../../components/ErrorResponse.yaml
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: ../../../components/ErrorResponse.yaml
