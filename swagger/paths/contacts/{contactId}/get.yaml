tags:
  - Contacts
summary: Отримати контакт за ID
operationId: getContactById
description: Повертає контакт по contactId. Потребує авторизації (Bearer Token).
security:
  - bearerAuth: []
parameters:
  - name: contactId
    in: path
    required: true
    schema:
      type: string
    description: Унікальний ідентифікатор контакту
responses:
  '200':
    description: Контакт знайдено
    content:
      application/json:
        schema:
          $ref: '../../../components/OneContactResponse.yaml'
  '404':
    description: Контакт не знайдено
    content:
      application/json:
        schema:
          $ref: '../../../components/ErrorResponse.yaml'
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: '../../../components/ErrorResponse.yaml'
