tags:
  - Contacts
summary: Отримати всі контакти користувача
operationId: getAllContacts
description: Повертає всі контакти, які належать авторизованому користувачу.
security:
  - bearerAuth: []
parameters:
  - name: page
    in: query
    schema:
      type: integer
      default: 1
    description: Номер сторінки
  - name: perPage
    in: query
    schema:
      type: integer
      default: 10
    description: Кількість контактів на сторінці
  - name: sortBy
    in: query
    schema:
      type: string
      default: "name"
    description: Сортувати за полем
  - name: sortOrder
    in: query
    schema:
      type: string
      default: "asc"
      enum: [asc, desc]
    description: Порядок сортування
  - name: type
    in: query
    schema:
      type: string
    description: Тип контакту (опціонально)
  - name: isFavourite
    in: query
    schema:
      type: boolean
    description: Вибраний контакт (опціонально)
responses:
  '200':
    description: Список контактів користувача з пагінацією
    content:
      application/json:
        schema:
          $ref: ../../components/GetContactsResponse.yaml
  '400':
    description: Некоректний запит
    content:
      application/json:
        schema:
          $ref: ../../components/ErrorResponse.yaml
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: ../../components/ErrorResponse.yaml
