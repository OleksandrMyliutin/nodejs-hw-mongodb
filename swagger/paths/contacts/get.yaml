tags:
  - Contacts
summary: Отримати список контактів
description: Повертає список контактів з підтримкою пагінації та сортування.
operationId: getAllContacts
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      minimum: 1
    description: Номер сторінки (пагінація)
  - in: query
    name: perPage
    schema:
      type: integer
      minimum: 1
    description: Кількість контактів на сторінку
  - in: query
    name: sortBy
    schema:
      type: string
    description: Поле для сортування (наприклад, "name")
  - in: query
    name: sortOrder
    schema:
      type: string
      enum: [asc, desc]
    description: Порядок сортування 'asc' (за зростанням) або 'desc' (за спаданням)
responses:
  '200':
    description: Успішне отримання списку контактів
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/Contact.yaml'
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 2
                totalItems:
                  type: integer
                  example: 1
                totalPages:
                  type: integer
                  example: 1
                hasPreviousPage:
                  type: boolean
                  example: false
                hasNextPage:
                  type: boolean
                  example: false
  '400':
    description: Некоректний запит
    content:
      application/json:
        schema:
          $ref: '../../components/ErrorResponse.yaml'
  '401':
    description: Неавторизовано
    content:
      application/json:
        schema:
          $ref: '../../components/ErrorResponse.yaml' 