type: object
properties:
  id:
    type: string
    description: Унікальний ідентифікатор контакту
    example: "612e1f7e3b5e3a6f8c123456"
  name:
    type: string
    description: Ім'я контакту
    example: "John Doe"
  phoneNumber:
    type: string
    description: Номер телефону контакту
    example: "+380123456789"
  contactType:
    type: string
    description: Тип контакту (наприклад, особистий або робочий)
    example: "personal"
  photo:
    type: string
    description: URL або шлях до фото контакту (якщо завантажено)
    example: "https://example.com/uploads/612e1f7e3b5e3a6f8c123456.jpg"
required:
  - id
  - name
  - phoneNumber
  - contactType