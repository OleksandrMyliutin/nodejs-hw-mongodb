type: object
properties:
  _id:
    type: string
    example: "1234567890abcdef"
  name:
    type: string
    example: "test"
  phoneNumber:
    type: string
    example: "+380501112233"
  contactType:
    type: string
    example: "personal"
  userId:
    type: string
    example: "abcdef1234567890"
  photo:
    type: string
    example: ""
  __v:
    type: integer
    example: 0
required:
  - _id
  - name
  - phoneNumber
  - contactType
  - userId
  - photo
  - __v
