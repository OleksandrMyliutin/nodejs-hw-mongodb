type: object
properties:
  status:
    type: string
    description: Статус (помилка) – значення "error"
    example: "error"
  message:
    type: string
    description: Опис помилки
    example: "Contact not found"
  data:
    type: object
    description: null (відсутні дані у випадку помилки)
    example: null
required:
  - status
  - message
  - data
