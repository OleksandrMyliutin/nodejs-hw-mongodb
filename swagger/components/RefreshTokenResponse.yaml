type: object
properties:
  status:
    type: integer
    example: 200
  message:
    type: string
    example: "Access token refreshed successfully!"
  data:
    type: object
    properties:
      accessToken:
        type: string
        example: "eyJhbGciOiJIUzI1NiIsInR..."
required:
  - status
  - message
  - data
