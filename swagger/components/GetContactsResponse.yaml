type: object
properties:
  status:
    type: integer
    example: 200
  message:
    type: string
    example: "Successfully found contacts!"
  data:
    type: object
    properties:
      contacts:
        type: array
        items:
          $ref: './Contact.yaml'
      page:
        type: integer
        example: 1
      perPage:
        type: integer
        example: 10
      total:
        type: integer
        example: 37
required:
  - status
  - message
  - data
